<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVVB | Links</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <button id="lang-toggle">
        <i class="fa-solid fa-language"></i> <span id="lang-text">عربي</span>
    </button>

    <main class="container">
        <header class="profile">
            <div class="avatar-container">
                <img src="avatar.JPG" alt="Profile Avatar" class="avatar">
            </div>
            <h1 class="username" id="username">SomeoneVeryVeryBored</h1>
        </header>

        <section class="links-grid">
            <a href="https://www.youtube.com/@SomeoneVeryVeryBored" target="_blank" class="link-btn" aria-label="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://tiktok.com/@someoneberyberybored" target="_blank" class="link-btn" aria-label="TikTok">
                <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="https://instagram.com/SomeoneVeryVeryBored" target="_blank" class="link-btn" aria-label="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://github.com/justAbdulaziz10" target="_blank" class="link-btn" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://x.com/AlkhlaiweA" target="_blank" class="link-btn" aria-label="X">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
